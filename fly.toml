# fly.toml - Backend configuration for pocketfund
# 使用方式: fly launch --no-deploy (首次) 或 fly deploy (更新)

app = "pocketfund-backend"  # 修改成你想要的應用名稱
primary_region = "sin"      # Singapore (接近台灣), 或 "nrt" (Tokyo), "hkg" (Hong Kong)

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
